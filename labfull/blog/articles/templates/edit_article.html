{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование | Django блог</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #d0f0e0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .form-card {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            color: #1e293b;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
            color: #2c6e49;
        }
        input, textarea {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #2c6e49;
        }
        textarea {
            resize: vertical;
            min-height: 150px;
        }
        button {
            width: 100%;
            background: #2c6e49;
            color: white;
            border: none;
            padding: 0.7rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            background: #1e4d32;
        }
        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #2c6e49;
            text-decoration: none;
            text-align: center;
            width: 100%;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .messages {
            margin-bottom: 1rem;
        }
        .alert {
            padding: 0.7rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .alert.success {
            background: #d1fae5;
            color: #065f46;
        }
        .alert.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="form-card">
        <h1>Редактировать статью</h1>
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert {{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="title">Название статьи</label>
                <input type="text" name="title" id="title" value="{{ post.title }}" required>
            </div>
            <div class="form-group">
                <label for="text">Текст статьи</label>
                <textarea name="text" id="text" rows="8" required>{{ post.text }}</textarea>
            </div>
            <button type="submit">Сохранить изменения</button>
        </form>
        <a href="{% url 'get_article' post.id %}" class="back-link">← Назад к статье</a>
    </div>
</body>
</html>
